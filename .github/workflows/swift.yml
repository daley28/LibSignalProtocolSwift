# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  swiftpm:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      - name: Resolve dependencies
        run: swift package resolve
      - name: Build
        run: swift build -v
      - name: Strict concurrency build
        run: swift build -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Run tests
        run: swift test -v

  apple-platforms:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
            destination: generic/platform=iOS
          - platform: tvOS
            destination: generic/platform=tvOS
          - platform: watchOS
            destination: generic/platform=watchOS
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      - name: Use Swift package workspace
        run: |
          mv SignalProtocol.xcodeproj SignalProtocol.xcodeproj.legacy
          mv SignalProtocol.xcworkspace SignalProtocol.xcworkspace.legacy
      - name: Download tvOS platform
        if: matrix.platform == 'tvOS'
        run: xcodebuild -downloadPlatform tvOS
      - name: Build for ${{ matrix.platform }}
        run: |
          set -o pipefail
          xcodebuild build -scheme LibSignalProtocolSwift -destination '${{ matrix.destination }}' | tail -80
